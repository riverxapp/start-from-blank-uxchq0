<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #ffffff;
      color: #111111;
      font-family: "Inter", sans-serif;
    }

    main {
      width: min(28rem, calc(100vw - 2rem));
      text-align: center;
    }

    .icon {
      width: 3rem;
      height: 3rem;
      margin: 0 auto 1rem;
      display: block;
      color: #111111;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      font-weight: 600;
    }

    p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.5;
      color: #444444;
    }
  </style>
</head>
<body>
  <main>
    <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M12 3L4 7V12C4 17 7.4 20.9 12 22C16.6 20.9 20 17 20 12V7L12 3Z" stroke="currentColor" stroke-width="1.5"/>
      <path d="M9.5 12L11.25 13.75L15 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>Open for Editing</h1>
    <p>Agent: edit this page freely and keep it simple.</p>
  </main>
</body>
</html>
